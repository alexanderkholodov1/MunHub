# fleet kit template — install as .github/workflows/ci.yml
#
# Quality gate for every PR (and pushes to main). Must be green before a PR is mergeable
# (doctrine 2: the PR is the deliverable, CI is the referee).
#
# STACK-SPECIFIC BLOCK: only the steps between the "── stack ──" markers depend on the
# project's toolchain. The example shows a pnpm/Node monorepo; replace those steps for your
# stack (cargo build/test/clippy, go vet/test, pytest/ruff, …) and keep the job and step
# NAMES stable — branch protection pins the check names "verify" and "secret-scan".
#
# The secret-scan job is stack-independent: keep it as-is, add a .gitleaks.toml at the repo
# root for project-specific allowlists.

name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: build · test · lint · typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ───────────────────────── stack-specific steps: BEGIN ─────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
      # ───────────────────────── stack-specific steps: END ───────────────────────────

  secret-scan:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required by gitleaks-action@v2 to scan pull-request commits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
