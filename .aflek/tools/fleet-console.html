<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AFLEK Fleet Console</title>
<style>
  :root { --bg:#0B0E14; --surf:#131722; --bd:#252C3B; --tx:#E6EAF2; --tx2:#9AA4B2; --cyan:#4CC9F0; --amber:#F5B544; --red:#E24B4A; --green:#5DCAA5; }
  * { box-sizing:border-box; }
  body { background:var(--bg); color:var(--tx); font-family:ui-sans-serif,system-ui,sans-serif; margin:0; padding:24px; line-height:1.6; }
  .wrap { max-width:780px; margin:0 auto; }
  h1 { font-size:20px; font-weight:500; margin:0 0 2px; }
  .sub { color:var(--tx2); font-size:13px; margin:0 0 18px; }
  .lbl { font-size:13px; font-weight:500; color:var(--tx2); margin:18px 0 8px; }
  .roster { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { display:flex; align-items:center; gap:7px; font-size:13px; border-radius:8px; padding:6px 11px; border:1px solid var(--bd); background:var(--surf); color:var(--tx); cursor:pointer; }
  .chip.off { opacity:0.4; }
  .chip .t { font-size:11px; color:var(--tx2); }
  .tree { display:flex; flex-direction:column; gap:8px; }
  .node { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:8px; border:1px solid var(--bd); background:var(--surf); }
  .node.bad { border-color:var(--red); }
  input,select,button,textarea { background:#0E1320; color:var(--tx); border:1px solid var(--bd); border-radius:6px; padding:6px 8px; font-size:12px; font-family:inherit; }
  button { cursor:pointer; }
  button:hover { border-color:var(--cyan); }
  .role { width:96px; font-weight:500; } .cmd { flex:1; } .mdl { width:130px; }
  .mini { padding:3px 7px; }
  .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:18px 0; }
  .card { background:var(--surf); border-radius:8px; padding:12px; } .card .k { font-size:12px; color:var(--tx2); } .card .v { font-size:24px; font-weight:500; }
  .warn { color:var(--red); font-size:13px; margin-bottom:12px; min-height:18px; }
  .actions { display:flex; gap:10px; flex-wrap:wrap; }
  .primary { border-color:var(--cyan); color:var(--cyan); padding:9px 14px; font-size:14px; }
  textarea { width:100%; height:160px; margin-top:14px; font-family:ui-monospace,monospace; display:none; }
  a.dl { color:var(--cyan); }
</style>
</head>
<body>
<div class="wrap">
  <h1>AFLEK fleet console</h1>
  <p class="sub" id="milestone"></p>
  <div class="lbl">Roster — click to include / exclude a provider</div>
  <div class="roster" id="roster"></div>
  <div class="lbl">Composition — chevrons change supervision level</div>
  <div class="tree" id="tree"></div>
  <button class="mini" id="add" style="margin-top:10px;">+ Add agent</button>
  <div class="cards">
    <div class="card"><div class="k">Agents active</div><div class="v" id="m-a">0</div></div>
    <div class="card"><div class="k">Frontier (paid)</div><div class="v" id="m-f">0</div></div>
    <div class="card"><div class="k">Free / cheap</div><div class="v" id="m-c">0</div></div>
  </div>
  <div class="warn" id="warn"></div>
  <div class="actions">
    <button class="primary" id="export">Export plan → wave-plan.json</button>
    <a class="dl" id="dl" style="display:none;"></a>
  </div>
  <textarea id="out" readonly></textarea>
</div>
<script>
const state = {
  milestone: "Edit me — e.g. translate all of planning/",
  roster: [
    { id:"gemini", name:"Gemini CLI", tier:"free", on:true },
    { id:"cursor", name:"Cursor · Claude", tier:"sub", on:true },
    { id:"claude", name:"Claude subagent", tier:"frontier", on:true },
    { id:"copilot", name:"Copilot · review", tier:"sub", on:false },
    { id:"vercel", name:"Vercel · deploy", tier:"sub", on:false },
  ],
  tree: [
    { role:"Adjutant", model:"claude", cmd:"Macro coherence review, opens the single PR", level:0 },
    { role:"Squad-lead", model:"cursor", cmd:"Consistency across batches", level:1 },
    { role:"Executor", model:"gemini", cmd:"Translate planning/07-10", level:2 },
  ],
};
const on = id => { const r = state.roster.find(r=>r.id===id); return r?r.on:true; };
const tier = id => (state.roster.find(r=>r.id===id)||{}).tier;
function rosterEl(){ const e=document.getElementById("roster"); e.innerHTML="";
  state.roster.forEach(r=>{ const b=document.createElement("button"); b.className="chip"+(r.on?"":" off");
    b.innerHTML=`${r.name} <span class="t">${r.tier}</span>`; b.onclick=()=>{r.on=!r.on; render();}; e.appendChild(b); }); }
function nodeEl(n,i){ const d=document.createElement("div"); d.className="node"+(on(n.model)?"":" bad");
  d.style.marginLeft=(n.level*22)+"px";
  const up=document.createElement("button"); up.className="mini"; up.textContent="▲"; up.title="more supervision"; up.onclick=()=>{if(n.level>0)n.level--; render();};
  const dn=document.createElement("button"); dn.className="mini"; dn.textContent="▼"; dn.onclick=()=>{if(n.level<3)n.level++; render();};
  const role=document.createElement("input"); role.className="role"; role.value=n.role; role.oninput=()=>n.role=role.value;
  const sel=document.createElement("select"); sel.className="mdl"; state.roster.forEach(r=>{const o=document.createElement("option"); o.value=r.id; o.textContent=r.name; if(r.id===n.model)o.selected=true; sel.appendChild(o);}); sel.onchange=()=>{n.model=sel.value; render();};
  const cmd=document.createElement("input"); cmd.className="cmd"; cmd.value=n.cmd; cmd.oninput=()=>n.cmd=cmd.value;
  const del=document.createElement("button"); del.className="mini"; del.textContent="✕"; del.onclick=()=>{state.tree.splice(i,1); render();};
  [up,dn,role,sel,cmd,del].forEach(x=>d.appendChild(x)); return d; }
function render(){ document.getElementById("milestone").textContent=state.milestone; rosterEl();
  const t=document.getElementById("tree"); t.innerHTML=""; state.tree.forEach((n,i)=>t.appendChild(nodeEl(n,i)));
  const act=state.tree.filter(n=>on(n.model));
  document.getElementById("m-a").textContent=act.length;
  document.getElementById("m-f").textContent=act.filter(n=>tier(n.model)==="frontier").length;
  document.getElementById("m-c").textContent=act.filter(n=>["free","sub"].includes(tier(n.model))).length;
  const bad=state.tree.filter(n=>!on(n.model));
  document.getElementById("warn").textContent=bad.length?`${bad.length} agent(s) use an excluded provider — re-assign or remove.`:"";
}
document.getElementById("add").onclick=()=>{ state.tree.push({role:"Executor", model:(state.roster.find(r=>r.on)||{}).id||"gemini", cmd:"new task", level:2}); render(); };
document.getElementById("export").onclick=()=>{
  const plan={ milestone:state.milestone, roster:state.roster.filter(r=>r.on).map(r=>r.id), tree:state.tree.map(n=>({role:n.role, model:(state.roster.find(r=>r.id===n.model)||{}).name, command:n.cmd, level:n.level})) };
  const json=JSON.stringify(plan,null,2);
  const ta=document.getElementById("out"); ta.style.display="block"; ta.value=json;
  const blob=new Blob([json],{type:"application/json"}); const a=document.getElementById("dl");
  a.href=URL.createObjectURL(blob); a.download="wave-plan.json"; a.style.display="inline"; a.textContent="download wave-plan.json"; a.click();
};
render();
</script>
</body>
</html>
