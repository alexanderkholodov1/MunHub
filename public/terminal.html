<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuNRa — Data Terminal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="favicon.svg">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        /* ─── Standalone terminal theme — clean dark UI ─── */
        :root {
            --bg:       #0d1117;
            --bg2:      #161b22;
            --bg3:      #21262d;
            --text:     #c9d1d9;
            --text2:    #8b949e;
            --accent:   #58a6ff;
            --green:    #3fb950;
            --red:      #f85149;
            --yellow:   #d29922;
            --border:   #30363d;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* Header — stays at top */
        .term-header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .term-brand {
            display: flex; align-items: center; gap: 8px;
            font-size: 1.1rem; font-weight: 600;
        }
        .term-brand-mu { color: var(--accent); font-size: 1.4rem; font-weight: 700; }

        .term-controls {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .term-status {
            padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
        }
        .term-status.disconnected { background: var(--red); color: #fff; }
        .term-status.connected    { background: var(--green); color: #000; }
        .term-status.recording    { background: var(--yellow); color: #000; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .term-btn {
            padding: 8px 18px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--bg3); color: var(--text); cursor: pointer;
            font-size: 0.9rem; font-weight: 500; transition: background 0.15s;
        }
        .term-btn:hover { background: #30363d; }
        .term-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .term-btn-primary { background: #238636; color: #fff; border-color: #238636; }
        .term-btn-primary:hover { background: #2ea043; }
        .term-btn-danger  { background: var(--red); color: #fff; border-color: var(--red); }
        .term-btn-danger:hover { background: #da3633; }

        /* Info bar — stays below header */
        .term-info {
            background: var(--bg2); border-bottom: 1px solid var(--border);
            padding: 8px 24px; display: flex; gap: 24px; font-size: 0.85rem; color: var(--text2);
            flex-shrink: 0; flex-wrap: wrap;
        }
        .term-info strong { color: var(--text); }

        /* Terminal output — fills remaining space, scrolls independently */
        .term-output {
            flex: 1; overflow-y: auto; padding: 12px 24px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.85rem; line-height: 1.6;
            min-height: 0; /* critical for flex overflow */
        }
        .term-line { padding: 1px 0; }
        .term-system { color: var(--text2); }
        .term-error  { color: var(--red); }
        .term-good   { color: var(--green); }
        .term-data   { color: var(--accent); }

        /* Browser compatibility banner */
        .compat-banner {
            background: #0d2137;
            border-bottom: 2px solid var(--accent);
            padding: 14px 24px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #c9d1d9;
            display: none; /* shown by JS if needed */
            flex-shrink: 0;
        }
        .compat-banner strong { color: #58a6ff; }
        .compat-banner a { color: #3fb950; text-decoration: underline; }
        .compat-banner .compat-dismiss {
            float: right; background: none; border: none; color: #8b949e;
            cursor: pointer; font-size: 1.2rem; line-height: 1;
        }
        .compat-banner code {
            background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 3px;
            font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 0.85em;
            color: #e6edf3;
        }
        .compat-banner .bridge-steps {
            margin: 8px 0 4px 0; padding: 0;
            list-style: none;
        }
        .compat-banner .bridge-steps li {
            padding: 2px 0;
            color: #c9d1d9;
        }
        .compat-banner .bridge-steps li::before {
            font-weight: 700;
            color: #58a6ff;
            margin-right: 6px;
        }
        .compat-banner .bridge-steps li:nth-child(1)::before { content: "1."; }
        .compat-banner .bridge-steps li:nth-child(2)::before { content: "2."; }
        .compat-banner .bridge-steps li:nth-child(3)::before { content: "3."; }
    </style>
</head>
<body>

    <!-- Browser compatibility banner (hidden by default, shown if Web Serial not available) -->
    <div class="compat-banner" id="compatBanner">
        <button class="compat-dismiss" id="compatDismiss">&times;</button>
        <div id="compatMessage"></div>
    </div>

    <header class="term-header">
        <div class="term-brand">
            <span class="term-brand-mu">μ</span>
            <span>MuNRa — Data Terminal</span>
            <span style="font-size:0.7rem;color:var(--text2);margin-left:8px;font-weight:400">v4.8.0</span>
        </div>
        <div class="term-controls">
            <div class="term-status disconnected" id="termStatus">Disconnected</div>
            <button class="term-btn term-btn-primary" id="connectBtn">Connect</button>
            <button class="term-btn term-btn-danger" id="disconnectBtn" disabled>Disconnect</button>
            <button class="term-btn term-btn-primary" id="startBtn" disabled>▶ Record</button>
            <button class="term-btn" id="stopBtn" disabled>■ Stop</button>
        </div>
    </header>

    <div class="term-info">
        <span>User: <strong id="infoUser">—</strong></span>
        <span>Profile: <strong id="infoProfile">—</strong></span>
        <span>Events: <strong id="infoEvents">0</strong></span>
        <span>SiPM: <strong id="infoSipm">— mV</strong></span>
        <span>Temp: <strong id="infoTemp">— °C</strong></span>
        <span>Pressure: <strong id="infoPressure">— Pa</strong></span>
        <span>Session: <strong id="infoSession">—</strong></span>
    </div>

    <div class="term-output" id="termOutput">
        <div class="term-line term-system">[System] Standalone data terminal ready.</div>
    </div>

    <!-- Shared modules (order matters) -->
    <script src="js/config.js?v=4.8.0"></script>

    <script>
    // ── Minimal shims so serial-reader.js works standalone ─────────────
    // UIManager shim
    const UIManager = {
        showToast(msg, type) {
            console.log(`[${type}] ${msg}`);
            termAppend(`[${type === 'error' ? 'Error' : 'System'}] ${msg}`, type === 'error' ? 'term-error' : 'term-system');
        },
        setConnectionStatus() {},
        updateModeLabels() {},
        highlightTimeButton() {},
        initTheme() {},
        toggleTheme() {},
        openSettings() {},
        closeSettings() {},
        openCustomRange() {},
        applyCustomRange() {},
        applyFirebaseUrl() {}
    };
    window.showToast = UIManager.showToast;

    // FirebaseManager shim — real Firebase, just minimal init
    const FirebaseManager = (() => {
        let _db = null;
        async function init() {
            try {
                if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
                _db = firebase.database();
                termAppend('[OK] Firebase connected.', 'term-good');
            } catch (e) { termAppend('[Error] Firebase: ' + e.message, 'term-error'); }
        }
        function getDb() { return _db; }
        return { init, getDb };
    })();

    // DataManager shim (serial-reader calls saveMinuteData → db write)
    const DataManager = {
        getAllData() { return []; },
        onChange() {},
        pushLocalRealtime() {},
        downsample(d) { return d; }
    };

    // ChartManager shim — only appendTerminalLine needed
    const ChartManager = {
        scheduleUpdate() {},
        appendTerminalLine(html) {
            const d = document.createElement('div');
            d.className = 'term-line';
            d.innerHTML = html;
            const out = document.getElementById('termOutput');
            out.appendChild(d);
            out.scrollTop = out.scrollHeight;
            while (out.children.length > 2000) out.removeChild(out.firstChild);
        }
    };

    // ProfileManager shim
    const ProfileManager = { loadProfiles() {}, getAllProfiles() { return {}; }, selectProfile() {}, filterProfiles() {} };
    const UploadManager = { handleSessionFile() {}, handleProfileFile() {}, exportAll() {} };

    // ── Terminal helpers ───────────────────────────────────────────────
    function termAppend(text, cls = '') {
        const d = document.createElement('div');
        d.className = 'term-line ' + cls;
        d.textContent = text;
        const out = document.getElementById('termOutput');
        out.appendChild(d);
        out.scrollTop = out.scrollHeight;
        while (out.children.length > 2000) out.removeChild(out.firstChild);
    }

    // ── Read query params ─────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const paramProfile  = params.get('profile');
    const paramRealtime = params.get('realtime') === '1';

    document.getElementById('infoProfile').textContent = paramProfile || '—';

    // ── Bootstrap ─────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        await FirebaseManager.init();

        // ── Browser compatibility check ───────────────────────────────
        // If Web Serial not available, show WebSocket Bridge info (NOT an error!)
        const hasSerial = ('serial' in navigator);
        if (!hasSerial) {
            const banner = document.getElementById('compatBanner');
            const msgEl  = document.getElementById('compatMessage');
            const ua = navigator.userAgent || '';
            let bName = 'your browser';
            if (/Firefox/i.test(ua))    bName = 'Firefox';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) bName = 'Safari';

            msgEl.innerHTML =
                `<strong>WebSocket Bridge Mode</strong> — ${bName} connects via a small bridge script.<br>` +
                '<ul class="bridge-steps">' +
                '<li>Install (one time): <code>pip3 install pyserial websockets</code></li>' +
                '<li>Run the bridge: <code>python3 tools/serial_bridge.py</code></li>' +
                '<li>Click <strong>Connect</strong> above</li>' +
                '</ul>' +
                '<a href="tools/serial_bridge.py" download>Download serial_bridge.py</a> ' +
                '| Data is also saved locally by the bridge (no minicom needed)';
            banner.style.display = 'block';
            // DO NOT disable the connect button — WebSocket bridge works!
            termAppend(`[Info] ${bName} detected — will use WebSocket Bridge mode.`, 'term-system');
            termAppend('[Info] Step 1: pip3 install pyserial websockets', 'term-system');
            termAppend('[Info] Step 2: python3 tools/serial_bridge.py', 'term-system');
            termAppend('[Info] Step 3: Click "Connect" above.', 'term-system');

            document.getElementById('compatDismiss').addEventListener('click', () => {
                banner.style.display = 'none';
            });
        }

        // Auth — try restoring session
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                termAppend(`[OK] Logged in as ${user.email}`, 'term-good');
                document.getElementById('infoUser').textContent = user.email;
            } else {
                termAppend('[System] Not logged in — data will NOT be saved to Firebase.', 'term-error');
                document.getElementById('infoUser').textContent = 'NOT LOGGED IN';
                document.getElementById('infoUser').style.color = 'var(--red)';
            }
        });

        // ── Wire buttons ──────────────────────────────────────────────
        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (typeof connectSerialPort === 'function') {
                try {
                    await connectSerialPort();
                    const mode = (typeof _connectionMode !== 'undefined' && _connectionMode === 'websocket')
                        ? 'Bridge' : 'USB';
                    document.getElementById('termStatus').className = 'term-status connected';
                    document.getElementById('termStatus').textContent = `Connected (${mode})`;
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('disconnectBtn').disabled = false;
                    document.getElementById('startBtn').disabled = false;
                    termAppend(`[OK] Connected via ${mode === 'Bridge' ? 'WebSocket Bridge' : 'Web Serial API'}.`, 'term-good');
                } catch (e) {
                    // Display multi-line diagnostics (serial-reader provides detailed messages)
                    const lines = (e.message || 'Unknown error').split('\n');
                    lines.forEach(line => {
                        if (line.trim()) termAppend('[Error] ' + line, 'term-error');
                    });
                }
            } else {
                termAppend('[Error] Serial reader module not loaded.', 'term-error');
            }
        });

        document.getElementById('disconnectBtn').addEventListener('click', async () => {
            try {
                if (typeof disconnectSerialPort === 'function') await disconnectSerialPort();
            } catch (e) { termAppend('[Error] ' + e.message, 'term-error'); }
            stopInfoUpdater();
            document.getElementById('termStatus').className = 'term-status disconnected';
            document.getElementById('termStatus').textContent = 'Disconnected';
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = true;
        });

        document.getElementById('startBtn').addEventListener('click', async () => {
            if (!paramProfile) { termAppend('[Error] No profile selected. Use ?profile=NAME in URL.', 'term-error'); return; }
            if (typeof startRecording === 'function') {
                try {
                    const sid = await startRecording(paramProfile, paramRealtime);
                    document.getElementById('termStatus').className = 'term-status recording';
                    document.getElementById('termStatus').textContent = 'Recording…';
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    document.getElementById('infoSession').textContent = sid.split('_')[1] || sid;
                    // Start live info bar updater
                    startInfoUpdater();
                } catch (e) {
                    termAppend('[Error] Could not start recording: ' + e.message, 'term-error');
                }
            }
        });

        document.getElementById('stopBtn').addEventListener('click', async () => {
            if (typeof stopRecording === 'function') {
                try { await stopRecording(); } catch (e) { termAppend('[Error] ' + e.message, 'term-error'); }
            }
            stopInfoUpdater();
            document.getElementById('termStatus').className = 'term-status connected';
            document.getElementById('termStatus').textContent = 'Connected';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        });

        termAppend('[System] Ready. Click "Connect" to start.', 'term-system');
    });

    // ── Live info bar updater ─────────────────────────────────────────
    let _infoInterval = null;
    function startInfoUpdater() {
        if (_infoInterval) clearInterval(_infoInterval);
        _infoInterval = setInterval(() => {
            // minuteData is a global in serial-reader.js
            if (typeof minuteData !== 'undefined') {
                document.getElementById('infoEvents').textContent = minuteData.eventCount || 0;
                const avgSipm = minuteData.eventCount > 0
                    ? (minuteData.sipmSum / minuteData.eventCount).toFixed(1)
                    : '—';
                document.getElementById('infoSipm').textContent = avgSipm + ' mV';
                const avgTemp = minuteData.tempCount > 0
                    ? (minuteData.tempSum / minuteData.tempCount).toFixed(1)
                    : '—';
                document.getElementById('infoTemp').textContent = avgTemp + ' °C';
                const avgPressure = minuteData.pressureCount > 0
                    ? (minuteData.pressureSum / minuteData.pressureCount).toFixed(0)
                    : '—';
                document.getElementById('infoPressure').textContent = avgPressure + ' Pa';
            }
        }, 1000);
    }
    function stopInfoUpdater() {
        if (_infoInterval) { clearInterval(_infoInterval); _infoInterval = null; }
    }
    </script>

    <!-- Serial reader — core data collection logic -->
    <script src="js/serial-reader.js?v=4.8.0"></script>
</body>
</html>
